name: Tests on Main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run test suite
        run: make test

  build-unstable-image:
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image_name
        run: echo "value=ghcr.io/${GITHUB_REPOSITORY,,}:unstable" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image tagged unstable
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image_name.outputs.value }}
